<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <g fill="white">
    <!-- Left note stem -->
    <rect x="156" y="128" width="24" height="232" rx="4"/>
    <!-- Right note stem -->
    <rect x="332" y="104" width="24" height="232" rx="4"/>
    <!-- Top beam -->
    <rect x="156" y="104" width="200" height="28" rx="4" transform="rotate(-4, 256, 118)"/>
    <!-- Bottom beam -->
    <rect x="156" y="152" width="200" height="28" rx="4" transform="rotate(-4, 256, 166)"/>
    <!-- Left note head -->
    <ellipse cx="144" cy="370" rx="52" ry="40" transform="rotate(-20, 144, 370)"/>
    <!-- Right note head -->
    <ellipse cx="320" cy="346" rx="52" ry="40" transform="rotate(-20, 320, 346)"/>
  </g>
</svg>
